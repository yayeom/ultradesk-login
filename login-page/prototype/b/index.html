<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page Concept B — Soft Orbs</title>
<style>
  /* ========== RESET & BASE ========== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    height: 100vh;
    background: #000;
  }

  /* ========== TAB NAVIGATION ========== */
  .tab-nav {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    display: flex;
    gap: 4px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 12px;
    padding: 4px;
    transition: all 0.4s ease;
  }
  .tab-nav.light {
    background: rgba(255,255,255,0.55);
    border: 1px solid rgba(255,255,255,0.7);
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
  }
  .tab-nav.dark {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
  }
  .tab-btn {
    padding: 10px 28px;
    border: none;
    background: transparent;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.3s ease;
    letter-spacing: 0.02em;
  }
  .light .tab-btn { color: rgba(0,0,0,0.4); }
  .light .tab-btn:hover { color: rgba(0,0,0,0.7); }
  .light .tab-btn.active { background: #fff; color: #1a1a2e; box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
  .dark .tab-btn { color: rgba(255,255,255,0.5); }
  .dark .tab-btn:hover { color: rgba(255,255,255,0.8); }
  .dark .tab-btn.active { background: rgba(255,255,255,0.12); color: #fff; }
  .tab-label {
    display: block;
    font-size: 10px;
    opacity: 0.6;
    margin-top: 2px;
  }

  /* ========== CONCEPT PANELS ========== */
  .concept { height: 100vh; width: 100vw; position: relative; }
  .concept.active { display: flex; }

  /* ========== FORM COMMON ========== */
  .form-group { margin-bottom: 16px; width: 100%; }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    font-size: 12px;
    opacity: 0.5;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
  }
  .g-icon { width: 18px; height: 18px; }

  .concept { display: flex; height: 100vh; width: 100vw; position: relative; }
  /* ========== CONCEPT B — Soft Orbs (Dark) + Planetary Orbit ========== */
  #conceptB {
    background: #09090B;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #conceptB .orbs-bg {
    position: absolute;
    inset: 0;
    overflow: hidden;
    perspective: 800px;
  }
  /* Orbit container — centers the rotation system */
  #conceptB .orbit-system {
    position: absolute;
    top: 50%; left: 50%;
    width: 0; height: 0;
    transform-style: preserve-3d;
  }
  /* Each orbit ring rotates in 3D */
  #conceptB .orbit-ring {
    position: absolute;
    top: 0; left: 0;
    transform-style: preserve-3d;
  }
  #conceptB .orbit-ring-1 {
    animation: orbitSpin1 25s linear infinite;
  }
  #conceptB .orbit-ring-2 {
    animation: orbitSpin2 35s linear infinite;
  }
  #conceptB .orbit-ring-3 {
    animation: orbitSpin3 30s linear infinite;
  }
  /* Orbs on the orbit */
  #conceptB .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(70px);
  }
  #conceptB .orb-1 {
    width: 450px; height: 450px;
    background: radial-gradient(circle, #3B82F6, transparent 65%);
    opacity: 0.55;
    /* Offset from center — radius of orbit */
    transform: translateX(280px) translateZ(0px);
  }
  #conceptB .orb-2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #8B5CF6, transparent 65%);
    opacity: 0.5;
    transform: translateX(220px) translateZ(50px);
  }
  #conceptB .orb-3 {
    width: 350px; height: 350px;
    background: radial-gradient(circle, #06B6D4, transparent 65%);
    opacity: 0.45;
    transform: translateX(320px) translateZ(-30px);
  }
  /* 3D orbit rotations — tilted planes, different speeds */
  @keyframes orbitSpin1 {
    0%   { transform: rotateX(60deg) rotateY(0deg); }
    100% { transform: rotateX(60deg) rotateY(360deg); }
  }
  @keyframes orbitSpin2 {
    0%   { transform: rotateX(45deg) rotateZ(30deg) rotateY(0deg); }
    100% { transform: rotateX(45deg) rotateZ(30deg) rotateY(-360deg); }
  }
  @keyframes orbitSpin3 {
    0%   { transform: rotateX(70deg) rotateZ(-20deg) rotateY(0deg); }
    100% { transform: rotateX(70deg) rotateZ(-20deg) rotateY(360deg); }
  }
  #conceptB .glass-card {
    position: relative;
    width: 420px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 48px 40px;
    z-index: 10;
  }
  #conceptB .logo {
    margin: 0 auto 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  #conceptB .logo svg { flex-shrink: 0; }
  #conceptB .logo .logo-text {
    font-size: 20px;
    font-weight: 600;
    background: linear-gradient(135deg, #3B82F6, #8B5CF6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.02em;
  }
  #conceptB h1 {
    font-size: 22px;
    font-weight: 600;
    color: #FAFAFA;
    text-align: center;
    margin-bottom: 4px;
  }
  #conceptB .subtitle {
    font-size: 14px;
    color: rgba(255,255,255,0.4);
    text-align: center;
    margin-bottom: 32px;
  }
  #conceptB .form-group label { color: rgba(255,255,255,0.6); }
  #conceptB .form-group input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    background: rgba(255,255,255,0.05);
    color: #fff;
    outline: none;
    transition: border-color 0.2s;
  }
  #conceptB .form-group input::placeholder { color: rgba(255,255,255,0.25); }
  #conceptB .form-group input:focus { border-color: rgba(139,92,246,0.5); }
  #conceptB .btn-primary {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #3B82F6, #8B5CF6);
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  #conceptB .btn-primary:hover { opacity: 0.9; }
  #conceptB .btn-google {
    width: 100%;
    padding: 12px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.8);
    font-size: 14px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.2s;
  }
  #conceptB .btn-google:hover { background: rgba(255,255,255,0.08); }
  #conceptB .forgot-link { text-align: right; margin-bottom: 20px; }
  #conceptB .forgot-link a { font-size: 13px; color: rgba(139,92,246,0.8); text-decoration: none; }
  #conceptB .divider { color: rgba(255,255,255,0.3); }
  #conceptB .divider::before, #conceptB .divider::after { background: rgba(255,255,255,0.1); }
  #conceptB .form-footer { text-align: center; margin-top: 24px; font-size: 13px; color: rgba(255,255,255,0.35); }
  #conceptB .form-footer a { color: rgba(139,92,246,0.8); text-decoration: none; font-weight: 500; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- ==================== CONCEPT B ==================== -->
<div id="conceptB" class="concept active">
  <div class="orbs-bg">
    <div class="orbit-system">
      <div class="orbit-ring orbit-ring-1">
        <div class="orb orb-1"></div>
      </div>
      <div class="orbit-ring orbit-ring-2">
        <div class="orb orb-2"></div>
      </div>
      <div class="orbit-ring orbit-ring-3">
        <div class="orb orb-3"></div>
      </div>
    </div>
  </div>
  <div class="glass-card">
    <div class="logo">
      <svg width="32" height="32" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="logoGrad" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#3B82F6"/>
            <stop offset="100%" stop-color="#8B5CF6"/>
          </linearGradient>
        </defs>
        <circle cx="6" cy="28" r="4.5" fill="url(#logoGrad)"/>
        <circle cx="6" cy="12" r="3" fill="url(#logoGrad)"/>
        <circle cx="20" cy="6" r="3.5" fill="url(#logoGrad)"/>
        <circle cx="30" cy="18" r="3" fill="url(#logoGrad)"/>
        <circle cx="22" cy="30" r="2.5" fill="url(#logoGrad)"/>
        <line x1="6" y1="28" x2="6" y2="12" stroke="url(#logoGrad)" stroke-width="1.5" opacity="0.5"/>
        <line x1="6" y1="12" x2="20" y2="6" stroke="url(#logoGrad)" stroke-width="1.5" opacity="0.5"/>
        <line x1="20" y1="6" x2="30" y2="18" stroke="url(#logoGrad)" stroke-width="1.5" opacity="0.45"/>
        <line x1="6" y1="28" x2="22" y2="30" stroke="url(#logoGrad)" stroke-width="1.5" opacity="0.4"/>
        <line x1="6" y1="12" x2="30" y2="18" stroke="url(#logoGrad)" stroke-width="1" opacity="0.3"/>
      </svg>
      <span class="logo-text">UltraDesk</span>
    </div>
    <h1 id="auth-title">Welcome to UltraDesk</h1>
    <p class="subtitle" id="auth-subtitle">Sign in to continue</p>
    <div id="auth-message" style="display:none; padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:16px;"></div>
    <div class="form-group" id="name-group" style="display:none;">
      <label>Name</label>
      <input type="text" id="signup-name" placeholder="Your name">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="name@company.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Enter your password">
    </div>
    <div class="form-group" id="confirm-group" style="display:none;">
      <label>Confirm Password</label>
      <input type="password" id="signup-confirm" placeholder="Confirm your password">
    </div>
    <div class="forgot-link" id="forgot-link"><a href="#" id="forgot-btn">Forgot password?</a></div>
    <button class="btn-primary" id="auth-btn">Sign in</button>
    <div class="divider"><span>or</span></div>
    <button class="btn-google" id="google-btn">
      <svg class="g-icon" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Sign in with Google
    </button>
    <div class="form-footer" id="auth-footer">New here? <a href="#" id="toggle-mode">Create account</a></div>
  </div>
</div>

<!-- Supabase Auth -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://xxruetynrhqdpadsqboz.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_kggHLyWQuUcY4N--iixvBQ_oqfW-IGm';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const emailInput = document.getElementById('login-email');
const passwordInput = document.getElementById('login-password');
const nameInput = document.getElementById('signup-name');
const confirmInput = document.getElementById('signup-confirm');
const authBtn = document.getElementById('auth-btn');
const googleBtn = document.getElementById('google-btn');
const forgotBtn = document.getElementById('forgot-btn');
const toggleBtn = document.getElementById('toggle-mode');
const authMsg = document.getElementById('auth-message');
const authTitle = document.getElementById('auth-title');
const authSubtitle = document.getElementById('auth-subtitle');
const authFooter = document.getElementById('auth-footer');
const nameGroup = document.getElementById('name-group');
const confirmGroup = document.getElementById('confirm-group');
const forgotLink = document.getElementById('forgot-link');

let isSignUp = false;

function showMessage(text, isError = false) {
  authMsg.style.display = 'block';
  authMsg.textContent = text;
  authMsg.style.background = isError ? 'rgba(239,68,68,0.15)' : 'rgba(59,130,246,0.15)';
  authMsg.style.color = isError ? '#FCA5A5' : '#93C5FD';
}
function hideMessage() { authMsg.style.display = 'none'; }
function setLoading(btn, loading) { btn.disabled = loading; btn.style.opacity = loading ? '0.6' : '1'; }

function setMode(signUp) {
  isSignUp = signUp;
  hideMessage();
  nameGroup.style.display = signUp ? 'block' : 'none';
  confirmGroup.style.display = signUp ? 'block' : 'none';
  forgotLink.style.display = signUp ? 'none' : 'block';
  authBtn.textContent = signUp ? 'Create account' : 'Sign in';
  authTitle.textContent = signUp ? 'Create your account' : 'Welcome to UltraDesk';
  authSubtitle.textContent = signUp ? 'Start connecting to any device' : 'Sign in to continue';
  authFooter.innerHTML = signUp
    ? 'Already have an account? <a href="#" id="toggle-mode">Sign in</a>'
    : 'New here? <a href="#" id="toggle-mode">Create account</a>';
  document.getElementById('toggle-mode').addEventListener('click', (e) => { e.preventDefault(); setMode(!isSignUp); });
}

toggleBtn.addEventListener('click', (e) => { e.preventDefault(); setMode(true); });

authBtn.addEventListener('click', async () => {
  hideMessage();
  const email = emailInput.value.trim();
  const password = passwordInput.value;
  if (!email || !password) { showMessage('Please enter email and password.', true); return; }

  if (isSignUp) {
    const name = nameInput.value.trim();
    const confirm = confirmInput.value;
    if (!name) { showMessage('Please enter your name.', true); return; }
    if (password.length < 6) { showMessage('Password must be at least 6 characters.', true); return; }
    if (password !== confirm) { showMessage('Passwords do not match.', true); return; }
    setLoading(authBtn, true);
    const { data, error } = await supabase.auth.signUp({ email, password, options: { data: { full_name: name } } });
    setLoading(authBtn, false);
    if (error) { showMessage(error.message, true); }
    else { showMessage('Account created! Please check your email to verify.'); }
  } else {
    setLoading(authBtn, true);
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    setLoading(authBtn, false);
    if (error) { showMessage(error.message, true); }
    else { showMessage('Login successful! Welcome, ' + (data.user.email || '')); }
  }
});

passwordInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { isSignUp ? confirmInput.focus() : authBtn.click(); } });
emailInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') passwordInput.focus(); });
confirmInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') authBtn.click(); });

googleBtn.addEventListener('click', async () => {
  hideMessage();
  const { error } = await supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
  if (error) showMessage(error.message, true);
});

forgotBtn.addEventListener('click', async (e) => {
  e.preventDefault(); hideMessage();
  const email = emailInput.value.trim();
  if (!email) { showMessage('Please enter your email first.', true); return; }
  const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo: window.location.href });
  if (error) { showMessage(error.message, true); }
  else { showMessage('Password reset email sent to ' + email); }
});

(async () => {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) showMessage('Already logged in as ' + session.user.email);
})();
</script>

</body>
</html>
