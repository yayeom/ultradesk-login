<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page Concepts — A / B</title>
<style>
  /* ========== RESET & BASE ========== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    height: 100vh;
    background: #000;
  }

  /* ========== TAB NAVIGATION ========== */
  .tab-nav {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    display: flex;
    gap: 4px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 12px;
    padding: 4px;
    transition: all 0.4s ease;
  }
  .tab-nav.light {
    background: rgba(255,255,255,0.55);
    border: 1px solid rgba(255,255,255,0.7);
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
  }
  .tab-nav.dark {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
  }
  .tab-btn {
    padding: 10px 28px;
    border: none;
    background: transparent;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.3s ease;
    letter-spacing: 0.02em;
  }
  .light .tab-btn { color: rgba(0,0,0,0.4); }
  .light .tab-btn:hover { color: rgba(0,0,0,0.7); }
  .light .tab-btn.active { background: #fff; color: #1a1a2e; box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
  .dark .tab-btn { color: rgba(255,255,255,0.5); }
  .dark .tab-btn:hover { color: rgba(255,255,255,0.8); }
  .dark .tab-btn.active { background: rgba(255,255,255,0.12); color: #fff; }
  .tab-label {
    display: block;
    font-size: 10px;
    opacity: 0.6;
    margin-top: 2px;
  }

  /* ========== CONCEPT PANELS ========== */
  .concept { display: none; height: 100vh; width: 100vw; position: relative; }
  .concept.active { display: flex; }

  /* ========== FORM COMMON ========== */
  .form-group { margin-bottom: 16px; width: 100%; }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    font-size: 12px;
    opacity: 0.5;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
  }
  .g-icon { width: 18px; height: 18px; }

  /* ========== CONCEPT A — Pastel Blue Nodes & R Formation ========== */
  #conceptA {
    background: linear-gradient(135deg, #eff6ff, #f5f3ff);
  }
  #conceptA .visual-side {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  /* Floating color orbs — fade in/out */
  #conceptA .visual-side .color-orbs {
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
    mix-blend-mode: multiply;
  }
  #conceptA .color-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
  }
  #conceptA .color-orb--pink {
    width: 600px; height: 600px;
    background: #F9E7FF;
    top: -10%; right: 5%;
    animation: orbPinkFloat 18s ease-in-out infinite;
  }
  #conceptA .color-orb--blue {
    width: 550px; height: 550px;
    background: #D1DFFF;
    bottom: -10%; left: 0%;
    animation: orbBlueFloat 22s ease-in-out infinite;
  }
  #conceptA .color-orb--pink2 {
    width: 400px; height: 400px;
    background: #F9E7FF;
    bottom: 15%; right: 25%;
    animation: orbPink2Float 25s ease-in-out infinite;
  }
  @keyframes orbPinkFloat {
    0%   { opacity: 0; transform: translate(0, 0) scale(0.8); }
    20%  { opacity: 0.7; transform: translate(-40px, 30px) scale(1.1); }
    50%  { opacity: 0.5; transform: translate(-60px, 50px) scale(1.0); }
    80%  { opacity: 0.7; transform: translate(-25px, 15px) scale(1.05); }
    100% { opacity: 0; transform: translate(0, 0) scale(0.8); }
  }
  @keyframes orbBlueFloat {
    0%   { opacity: 0; transform: translate(0, 0) scale(0.9); }
    25%  { opacity: 0.65; transform: translate(50px, -30px) scale(1.05); }
    50%  { opacity: 0.45; transform: translate(70px, -50px) scale(1.1); }
    75%  { opacity: 0.7; transform: translate(35px, -20px) scale(1.0); }
    100% { opacity: 0; transform: translate(0, 0) scale(0.9); }
  }
  @keyframes orbPink2Float {
    0%   { opacity: 0; transform: translate(0, 0) scale(0.85); }
    30%  { opacity: 0.6; transform: translate(-25px, -40px) scale(1.0); }
    60%  { opacity: 0.4; transform: translate(25px, -60px) scale(1.1); }
    85%  { opacity: 0.65; transform: translate(15px, -25px) scale(1.05); }
    100% { opacity: 0; transform: translate(0, 0) scale(0.85); }
  }
  #conceptA .visual-side canvas#canvasA {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    cursor: default;
  }
  #conceptA .visual-side .hover-hint {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: rgba(60, 80, 140, 0.45);
    letter-spacing: 0.05em;
    pointer-events: none;
    transition: opacity 0.5s;
  }
  #conceptA .form-side {
    width: 460px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px;
    border-left: 1px solid rgba(255,255,255,0.6);
  }
  #conceptA .form-container { width: 100%; max-width: 340px; }
  #conceptA .form-container .logo {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, #5B8DEF, #7E6CF0);
    border-radius: 10px;
    margin-bottom: 32px;
  }
  #conceptA .form-container h1 {
    font-size: 24px;
    font-weight: 600;
    color: #1a1a2e;
    margin-bottom: 8px;
  }
  #conceptA .form-container .subtitle {
    font-size: 14px;
    color: #7889a8;
    margin-bottom: 32px;
  }
  #conceptA .form-group label { color: #3a4a6b; }
  #conceptA .form-group input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid rgba(120,140,200,0.2);
    border-radius: 10px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
    outline: none;
    background: rgba(255,255,255,0.6);
  }
  #conceptA .form-group input:focus {
    border-color: #5B8DEF;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(91,141,239,0.1);
  }
  #conceptA .btn-primary {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #5B8DEF, #7E6CF0);
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 2px 12px rgba(91,141,239,0.3);
  }
  #conceptA .btn-primary:hover { box-shadow: 0 4px 20px rgba(91,141,239,0.4); transform: translateY(-1px); }
  #conceptA .btn-google {
    width: 100%;
    padding: 12px;
    border: 1px solid rgba(120,140,200,0.2);
    border-radius: 10px;
    background: rgba(255,255,255,0.6);
    color: #3a4a6b;
    font-size: 14px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.2s;
  }
  #conceptA .btn-google:hover { background: #fff; }
  #conceptA .forgot-link { text-align: right; margin-bottom: 20px; }
  #conceptA .forgot-link a { font-size: 13px; color: #5B8DEF; text-decoration: none; }
  #conceptA .divider { color: #9aa8c0; }
  #conceptA .divider::before, #conceptA .divider::after { background: rgba(120,140,200,0.2); }
  #conceptA .form-footer { text-align: center; margin-top: 24px; font-size: 13px; color: #9aa8c0; }
  #conceptA .form-footer a { color: #5B8DEF; text-decoration: none; font-weight: 500; }

  /* ========== CONCEPT B — Soft Orbs (Dark) + Planetary Orbit ========== */
  #conceptB {
    background: #09090B;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #conceptB .orbs-bg {
    position: absolute;
    inset: 0;
    overflow: hidden;
    perspective: 800px;
  }
  /* Orbit container — centers the rotation system */
  #conceptB .orbit-system {
    position: absolute;
    top: 50%; left: 50%;
    width: 0; height: 0;
    transform-style: preserve-3d;
  }
  /* Each orbit ring rotates in 3D */
  #conceptB .orbit-ring {
    position: absolute;
    top: 0; left: 0;
    transform-style: preserve-3d;
  }
  #conceptB .orbit-ring-1 {
    animation: orbitSpin1 25s linear infinite;
  }
  #conceptB .orbit-ring-2 {
    animation: orbitSpin2 35s linear infinite;
  }
  #conceptB .orbit-ring-3 {
    animation: orbitSpin3 30s linear infinite;
  }
  /* Orbs on the orbit */
  #conceptB .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(70px);
  }
  #conceptB .orb-1 {
    width: 450px; height: 450px;
    background: radial-gradient(circle, #3B82F6, transparent 65%);
    opacity: 0.55;
    /* Offset from center — radius of orbit */
    transform: translateX(280px) translateZ(0px);
  }
  #conceptB .orb-2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #8B5CF6, transparent 65%);
    opacity: 0.5;
    transform: translateX(220px) translateZ(50px);
  }
  #conceptB .orb-3 {
    width: 350px; height: 350px;
    background: radial-gradient(circle, #06B6D4, transparent 65%);
    opacity: 0.45;
    transform: translateX(320px) translateZ(-30px);
  }
  /* 3D orbit rotations — tilted planes, different speeds */
  @keyframes orbitSpin1 {
    0%   { transform: rotateX(60deg) rotateY(0deg); }
    100% { transform: rotateX(60deg) rotateY(360deg); }
  }
  @keyframes orbitSpin2 {
    0%   { transform: rotateX(45deg) rotateZ(30deg) rotateY(0deg); }
    100% { transform: rotateX(45deg) rotateZ(30deg) rotateY(-360deg); }
  }
  @keyframes orbitSpin3 {
    0%   { transform: rotateX(70deg) rotateZ(-20deg) rotateY(0deg); }
    100% { transform: rotateX(70deg) rotateZ(-20deg) rotateY(360deg); }
  }
  #conceptB .glass-card {
    position: relative;
    width: 420px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 48px 40px;
    z-index: 10;
  }
  #conceptB .logo {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, #3B82F6, #8B5CF6);
    border-radius: 8px;
    margin: 0 auto 28px;
  }
  #conceptB h1 {
    font-size: 22px;
    font-weight: 600;
    color: #FAFAFA;
    text-align: center;
    margin-bottom: 4px;
  }
  #conceptB .subtitle {
    font-size: 14px;
    color: rgba(255,255,255,0.4);
    text-align: center;
    margin-bottom: 32px;
  }
  #conceptB .form-group label { color: rgba(255,255,255,0.6); }
  #conceptB .form-group input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    background: rgba(255,255,255,0.05);
    color: #fff;
    outline: none;
    transition: border-color 0.2s;
  }
  #conceptB .form-group input::placeholder { color: rgba(255,255,255,0.25); }
  #conceptB .form-group input:focus { border-color: rgba(139,92,246,0.5); }
  #conceptB .btn-primary {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #3B82F6, #8B5CF6);
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  #conceptB .btn-primary:hover { opacity: 0.9; }
  #conceptB .btn-google {
    width: 100%;
    padding: 12px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.8);
    font-size: 14px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.2s;
  }
  #conceptB .btn-google:hover { background: rgba(255,255,255,0.08); }
  #conceptB .forgot-link { text-align: right; margin-bottom: 20px; }
  #conceptB .forgot-link a { font-size: 13px; color: rgba(139,92,246,0.8); text-decoration: none; }
  #conceptB .divider { color: rgba(255,255,255,0.3); }
  #conceptB .divider::before, #conceptB .divider::after { background: rgba(255,255,255,0.1); }
  #conceptB .form-footer { text-align: center; margin-top: 24px; font-size: 13px; color: rgba(255,255,255,0.35); }
  #conceptB .form-footer a { color: rgba(139,92,246,0.8); text-decoration: none; font-weight: 500; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- TAB NAVIGATION -->
<nav class="tab-nav light" id="tabNav">
  <button class="tab-btn active" onclick="switchTab('A')">
    A<span class="tab-label">Nodes & R</span>
  </button>
  <button class="tab-btn" onclick="switchTab('B')">
    B<span class="tab-label">Soft Orbs</span>
  </button>
</nav>

<!-- ==================== CONCEPT A ==================== -->
<div id="conceptA" class="concept active">
  <div class="visual-side">
    <div class="color-orbs">
      <div class="color-orb color-orb--pink"></div>
      <div class="color-orb color-orb--blue"></div>
      <div class="color-orb color-orb--pink2"></div>
    </div>
    <canvas id="canvasA"></canvas>
    <div class="hover-hint">Hover over the canvas</div>
  </div>
  <div class="form-side">
    <div class="form-container">
      <div class="logo"></div>
      <h1>Sign in to your workspace</h1>
      <p class="subtitle">Connect to any device, anywhere</p>
      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="name@company.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="Enter your password">
      </div>
      <div class="forgot-link"><a href="#">Forgot password?</a></div>
      <button class="btn-primary">Continue</button>
      <div class="divider"><span>or</span></div>
      <button class="btn-google">
        <svg class="g-icon" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>

      </button>
      <div class="form-footer">Don't have an account? <a href="#">Contact sales</a></div>
    </div>
  </div>
</div>

<!-- ==================== CONCEPT B ==================== -->
<div id="conceptB" class="concept">
  <div class="orbs-bg">
    <div class="orbit-system">
      <div class="orbit-ring orbit-ring-1">
        <div class="orb orb-1"></div>
      </div>
      <div class="orbit-ring orbit-ring-2">
        <div class="orb orb-2"></div>
      </div>
      <div class="orbit-ring orbit-ring-3">
        <div class="orb orb-3"></div>
      </div>
    </div>
  </div>
  <div class="glass-card">
    <div class="logo"></div>
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to continue</p>
    <div class="form-group">
      <label>Email</label>
      <input type="email" placeholder="name@company.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" placeholder="Enter your password">
    </div>
    <div class="forgot-link"><a href="#">Forgot password?</a></div>
    <button class="btn-primary">Sign in</button>
    <div class="divider"><span>or</span></div>
    <button class="btn-google">
      <svg class="g-icon" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Sign in with Google
    </button>
    <div class="form-footer">New here? <a href="#">Request access</a></div>
  </div>
</div>

/* ========== TAB SWITCHING ========== */
function switchTab(id) {
  document.querySelectorAll('.concept').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('concept' + id).classList.add('active');
  document.querySelectorAll('.tab-btn')[['A','B'].indexOf(id)].classList.add('active');
  const nav = document.getElementById('tabNav');
  nav.classList.remove('light', 'dark');
  nav.classList.add(id === 'B' ? 'dark' : 'light');
  if (id === 'A' && !canvasAInit) initCanvasA();
}

/* ========== CONCEPT A — Nodes & R Formation (Image-based) ========== */
let canvasAInit = false;
let logoPixelData = null; // will hold {edgePixels, fillPixels} from actual image

// Load actual R logo image and extract red pixel positions
function loadRLogoPixels() {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const S = 200;
      const oc = document.createElement('canvas');
      oc.width = S; oc.height = S;
      const o = oc.getContext('2d');
      o.drawImage(img, 0, 0, S, S);
      const d = o.getImageData(0, 0, S, S).data;
      const edgePixels = [], fillPixels = [];
      // Detect red pixels from the flat R logo image
      const isShape = (x, y) => {
        const i = (y * S + x) * 4;
        const r = d[i], g = d[i+1], b = d[i+2];
        // Simple and reliable: R channel dominant, clearly red
        return r > 150 && r > g * 1.3 && r > b * 1.3;
      };
      for (let y = 2; y < S-2; y++) {
        for (let x = 2; x < S-2; x++) {
          if (isShape(x, y)) {
            const edge = !isShape(x,y-1)||!isShape(x,y+1)||!isShape(x-1,y)||!isShape(x+1,y)||
                         !isShape(x-1,y-1)||!isShape(x+1,y+1)||!isShape(x+1,y-1)||!isShape(x-1,y+1);
            (edge ? edgePixels : fillPixels).push({x: x/S, y: y/S});
          }
        }
      }
      resolve({edgePixels, fillPixels});
    };
    img.onerror = () => {
      console.warn('Could not load R logo image, using fallback');
      resolve(null);
    };
    img.src = R_LOGO_SRC;
  });
}

// Seeded PRNG (mulberry32) for reproducible shapes
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function sampleFromPixels(pixelData, count, cx, cy, size) {
  const rng = mulberry32(42); // fixed seed = same shape every time
  const allPixels = [...pixelData.edgePixels, ...pixelData.fillPixels];
  if (allPixels.length === 0) return [];

  // Poisson Disk Sampling: evenly spaced points within the shape
  // 1. Build a grid lookup using ALL shape pixels
  const gridRes = 200;
  const shapeGrid = new Set();
  allPixels.forEach(p => {
    const gx = Math.floor(p.x * gridRes);
    const gy = Math.floor(p.y * gridRes);
    shapeGrid.add(gx + ',' + gy);
  });
  const inShape = (px, py) => {
    const gx = Math.floor(px * gridRes);
    const gy = Math.floor(py * gridRes);
    // Check 3x3 neighborhood for tolerance
    for (let dx = -1; dx <= 1; dx++)
      for (let dy = -1; dy <= 1; dy++)
        if (shapeGrid.has((gx+dx)+','+(gy+dy))) return true;
    return false;
  };

  // 2. Find bounding box
  let mnX=1,mxX=0,mnY=1,mxY=0;
  allPixels.forEach(p=>{if(p.x<mnX)mnX=p.x;if(p.x>mxX)mxX=p.x;if(p.y<mnY)mnY=p.y;if(p.y>mxY)mxY=p.y;});

  // 3. Calculate minimum distance based on actual pixel coverage
  const pixelArea = allPixels.length / (gridRes * gridRes); // actual shape area ratio
  const bboxArea = (mxX - mnX) * (mxY - mnY);
  const shapeArea = Math.max(pixelArea, bboxArea * 0.15); // at least 15% of bbox
  const minDist = Math.sqrt(shapeArea / count) * 0.75;

  // 4. Poisson disk sampling via dart throwing with grid acceleration
  const cellSize = minDist / Math.SQRT2;
  const gridW = Math.ceil((mxX - mnX) / cellSize) + 1;
  const gridH = Math.ceil((mxY - mnY) / cellSize) + 1;
  const grid = new Array(gridW * gridH).fill(-1);
  const points = [];
  const activeList = [];

  const toGrid = (px, py) => ({
    gx: Math.floor((px - mnX) / cellSize),
    gy: Math.floor((py - mnY) / cellSize)
  });

  const tooClose = (px, py) => {
    const {gx, gy} = toGrid(px, py);
    for (let dx = -2; dx <= 2; dx++) {
      for (let dy = -2; dy <= 2; dy++) {
        const nx = gx + dx, ny = gy + dy;
        if (nx >= 0 && nx < gridW && ny >= 0 && ny < gridH) {
          const idx = grid[ny * gridW + nx];
          if (idx >= 0) {
            const ex = points[idx].x - px, ey = points[idx].y - py;
            if (ex*ex + ey*ey < minDist*minDist) return true;
          }
        }
      }
    }
    return false;
  };

  // Seed with a deterministic shape pixel
  const seed = allPixels[Math.floor(rng() * allPixels.length)];
  points.push(seed);
  activeList.push(0);
  const sg = toGrid(seed.x, seed.y);
  grid[sg.gy * gridW + sg.gx] = 0;

  const maxAttempts = 30;
  while (activeList.length > 0 && points.length < count * 1.5) {
    const ri = Math.floor(rng() * activeList.length);
    const pt = points[activeList[ri]];
    let found = false;
    for (let a = 0; a < maxAttempts; a++) {
      const angle = rng() * Math.PI * 2;
      const dist = minDist + rng() * minDist;
      const nx = pt.x + Math.cos(angle) * dist;
      const ny = pt.y + Math.sin(angle) * dist;
      if (nx >= mnX && nx <= mxX && ny >= mnY && ny <= mxY && inShape(nx, ny) && !tooClose(nx, ny)) {
        const np = {x: nx, y: ny};
        const ng = toGrid(nx, ny);
        points.push(np);
        activeList.push(points.length - 1);
        grid[ng.gy * gridW + ng.gx] = points.length - 1;
        found = true;
        break;
      }
    }
    if (!found) activeList.splice(ri, 1);
  }

  // 5. Trim to exact count if we got too many
  while (points.length > count) {
    points.splice(Math.floor(rng() * points.length), 1);
  }

  // 6. If we got fewer, fill with deterministic shape pixels
  while (points.length < count) {
    points.push(allPixels[Math.floor(rng() * allPixels.length)]);
  }

  // Shuffle with seeded rng
  for (let i = points.length-1; i > 0; i--) { const j = Math.floor(rng()*(i+1)); [points[i],points[j]]=[points[j],points[i]]; }

  // Center and scale
  const pcx = (mnX+mxX)/2, pcy = (mnY+mxY)/2;
  return points.map(pt=>({x:cx+(pt.x-pcx)*size, y:cy+(pt.y-pcy)*size}));
}

function initCanvasA() {
  canvasAInit = true;
  const canvas = document.getElementById('canvasA');
  const ctx = canvas.getContext('2d');
  const hint = document.querySelector('#conceptA .hover-hint');
  let w, h;
  let mouseInCanvas = false;
  let hoverBlend = 0;

  // Node counts
  const VISIBLE_IDLE = 60;      // logo nodes visible when idle
  const LOGO_NODE_COUNT = 300;  // total logo nodes (rest appear on hover)
  const BG_NODE_COUNT = 120;    // always-floating background nodes

  let nodes = [];
  let rTargets = [];

  function resize() {
    const r = window.devicePixelRatio || 1;
    const rect = canvas.parentElement.getBoundingClientRect();
    w = rect.width; h = rect.height;
    canvas.width = w * r; canvas.height = h * r;
    canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
    ctx.setTransform(r, 0, 0, r, 0, 0);
    if (logoPixelData) {
      rTargets = sampleFromPixels(logoPixelData, LOGO_NODE_COUNT, w * 0.46, h * 0.50, Math.min(w, h) * 0.68);
    }
  }

  function createNodes() {
    nodes = [];

    // Logo nodes: first VISIBLE_IDLE are "always visible", rest spawn on hover
    for (let i = 0; i < LOGO_NODE_COUNT; i++) {
      const sat = 78 + Math.random() * 17;
      const light = 48 + Math.random() * 18;
      const alwaysVisible = i < VISIBLE_IDLE;
      // ~3 idle nodes sparkle, ~5 logo nodes sparkle when formed
      const idleSparkle = alwaysVisible && Math.random() > 0.95;
      const formedSparkle = !alwaysVisible && Math.random() > 0.98;
      nodes.push({
        x: Math.random() * w,
        y: Math.random() * h,
        homeX: 0, homeY: 0,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        r: alwaysVisible ? (Math.random() * 2.0 + 1.5) : (Math.random() * 1.8 + 1.2),
        color: `hsla(220, ${sat}%, ${light}%,`,
        bright: alwaysVisible ? Math.random() > 0.5 : Math.random() > 0.7,
        type: 'logo',
        alwaysVisible: alwaysVisible,
        opacity: alwaysVisible ? 1.0 : 0.0,
        sparkle: idleSparkle ? 'idle' : (formedSparkle ? 'formed' : false),
        sparklePhase: Math.random() * Math.PI * 2,
        sparkleSpeed: 0.4 + Math.random() * 0.5,   // slow: 5~8초 주기
      });
    }
    // Store home positions (for scatter-back)
    nodes.forEach(n => { n.homeX = n.x; n.homeY = n.y; });

    // Background nodes: always visible, low opacity, never join R
    for (let i = 0; i < BG_NODE_COUNT; i++) {
      const sat = 55 + Math.random() * 25;
      const light = 52 + Math.random() * 18;
      nodes.push({
        x: Math.random() * w,
        y: Math.random() * h,
        homeX: 0, homeY: 0,
        vx: (Math.random() - 0.5) * 0.2,
        vy: (Math.random() - 0.5) * 0.2,
        r: Math.random() * 2.2 + 1.2,
        color: `hsla(218, ${sat}%, ${light}%,`,
        bright: Math.random() > 0.6,
        type: 'bg',
        alwaysVisible: true,
        opacity: 0.85,
        sparkle: Math.random() > 0.95 ? 'idle' : false, // ~5% of bg nodes sparkle (~6개)
        sparklePhase: Math.random() * Math.PI * 2,
        sparkleSpeed: 0.3 + Math.random() * 0.4,   // slow: 6~10초 주기
      });
    }
  }

  canvas.addEventListener('mouseenter', () => { mouseInCanvas = true; hint.style.opacity = '0'; });
  canvas.addEventListener('mouseleave', () => { mouseInCanvas = false; hint.style.opacity = '1'; });

  function draw() {
    ctx.clearRect(0, 0, w, h);

    // Asymmetric blend: slow formation (0.012), faster scatter-back (0.035)
    const targetBlend = mouseInCanvas ? 1 : 0;
    const blendSpeed = mouseInCanvas ? 0.012 : 0.035;
    hoverBlend += (targetBlend - hoverBlend) * blendSpeed;

    // Ease curve for scatter-back: cubic ease-out for natural deceleration
    const scatterEase = mouseInCanvas ? hoverBlend : (1 - Math.pow(1 - hoverBlend, 0.5));
    const effectiveBlend = mouseInCanvas ? hoverBlend : scatterEase;

    // Update node positions & opacity
    nodes.forEach((n, i) => {
      if (n.type === 'bg') {
        // BG nodes always float
        n.x += n.vx;
        n.y += n.vy;
      } else {
        // Logo node opacity: always-visible stay at 1, others fade in/out with hover
        if (n.alwaysVisible) {
          n.opacity = 1.0;
        } else {
          const targetOpacity = mouseInCanvas ? 1.0 : 0.0;
          const fadeSpeed = mouseInCanvas ? 0.025 : 0.05; // fade out faster
          n.opacity += (targetOpacity - n.opacity) * fadeSpeed;
        }

        // Move toward R target
        if (effectiveBlend > 0.005 && rTargets[i]) {
          const tx = rTargets[i].x;
          const ty = rTargets[i].y;
          const lerpSpeed = 0.02 + (i / LOGO_NODE_COUNT) * 0.012;
          n.x += (tx - n.x) * lerpSpeed * effectiveBlend;
          n.y += (ty - n.y) * lerpSpeed * effectiveBlend;
        }

        // Free movement (fades as R forms)
        const freeFactor = 1 - effectiveBlend * 0.95;
        n.x += n.vx * freeFactor;
        n.y += n.vy * freeFactor;

        // When scattering back, give a gentle push outward from center
        if (!mouseInCanvas && hoverBlend > 0.02 && hoverBlend < 0.8) {
          const cx = w * 0.46, cy = h * 0.5;
          const dx = n.x - cx, dy = n.y - cy;
          const dist = Math.sqrt(dx*dx + dy*dy) || 1;
          const pushStrength = 0.3 * (1 - hoverBlend);
          n.x += (dx / dist) * pushStrength;
          n.y += (dy / dist) * pushStrength;
        }
      }

      // Boundary bounce
      if (n.x < 0 || n.x > w) n.vx *= -1;
      if (n.y < 0 || n.y > h) n.vy *= -1;
      n.x = Math.max(0, Math.min(w, n.x));
      n.y = Math.max(0, Math.min(h, n.y));
    });

    // Draw connection lines (only between visible nodes)
    const maxDist = 85 + effectiveBlend * 40;
    const bgMaxDist = 150;
    for (let i = 0; i < nodes.length; i++) {
      if (nodes[i].opacity < 0.05) continue; // skip invisible
      for (let j = i + 1; j < nodes.length; j++) {
        if (nodes[j].opacity < 0.05) continue;
        const dx = nodes[i].x - nodes[j].x;
        const dy = nodes[i].y - nodes[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const anyBg = nodes[i].type === 'bg' || nodes[j].type === 'bg';
        const bothBg = nodes[i].type === 'bg' && nodes[j].type === 'bg';
        const limit = anyBg ? bgMaxDist : maxDist;
        if (dist < limit) {
          const pairOpacity = Math.min(nodes[i].opacity, nodes[j].opacity);
          let alpha = (1 - dist / limit) * (0.10 + effectiveBlend * 0.16) * pairOpacity;
          if (bothBg) alpha *= 0.4;
          else if (anyBg) alpha *= 0.55;
          ctx.beginPath();
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.strokeStyle = `rgba(37, 100, 237, ${alpha})`;
          ctx.lineWidth = anyBg ? 0.35 : (0.5 + effectiveBlend * 0.4);
          ctx.stroke();
        }
      }
    }

    // Time for sparkle animation
    const time = performance.now() / 1000;

    // Draw nodes
    nodes.forEach(n => {
      if (n.opacity < 0.02) return;

      const nodeAlpha = n.type === 'bg' ? n.opacity : n.opacity * (0.65 + effectiveBlend * 0.35);

      // ===== Star Twinkle — 부드러운 번쩍 + 십자 광선 =====
      let twinkle = 0;
      if (n.sparkle) {
        const active =
          (n.sparkle === 'idle' && effectiveBlend < 0.3) ||
          (n.sparkle === 'formed' && effectiveBlend > 0.7) ||
          (n.sparkle === 'idle' && n.type === 'bg');
        if (active) {
          // Smooth sine wave — gentle rise and fall
          const wave = Math.sin(time * n.sparkleSpeed + n.sparklePhase);
          twinkle = Math.max(0, wave) * Math.max(0, wave); // smooth quadratic curve
        }
      }

      // Normal glow
      if (n.bright && nodeAlpha > 0.1 && twinkle < 0.05) {
        const glowSize = n.r * (5 + effectiveBlend * 4);
        const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, glowSize);
        grad.addColorStop(0, n.color + (0.20 * nodeAlpha).toFixed(2) + ')');
        grad.addColorStop(0.5, n.color + (0.05 * nodeAlpha).toFixed(2) + ')');
        grad.addColorStop(1, 'transparent');
        ctx.beginPath();
        ctx.arc(n.x, n.y, glowSize, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
      }

      // Star twinkle — soft bright glow + cross rays
      if (twinkle > 0.02) {
        const t = twinkle; // 0~1, smooth
        const flashAlpha = t * 0.6 * nodeAlpha;
        const flashSize = n.r * (6 + t * 14);

        // Soft radial glow — bright white-blue center
        const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, flashSize);
        grad.addColorStop(0, `rgba(235, 245, 255, ${(flashAlpha * 0.85).toFixed(3)})`);
        grad.addColorStop(0.25, `rgba(200, 225, 255, ${(flashAlpha * 0.5).toFixed(3)})`);
        grad.addColorStop(0.6, `rgba(160, 200, 255, ${(flashAlpha * 0.15).toFixed(3)})`);
        grad.addColorStop(1, 'transparent');
        ctx.beginPath();
        ctx.arc(n.x, n.y, flashSize, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();

        // Cross rays (+) — soft, only visible at higher intensity
        if (t > 0.2) {
          const rayT = (t - 0.2) / 0.8; // 0~1 within ray range
          const rayLen = n.r * (3 + rayT * 10);
          const rayAlpha = rayT * 0.4 * nodeAlpha;
          ctx.strokeStyle = `rgba(220, 235, 255, ${rayAlpha.toFixed(3)})`;
          ctx.lineWidth = 0.5 + rayT * 0.5;
          // Horizontal
          ctx.beginPath();
          ctx.moveTo(n.x - rayLen, n.y);
          ctx.lineTo(n.x + rayLen, n.y);
          ctx.stroke();
          // Vertical
          ctx.beginPath();
          ctx.moveTo(n.x, n.y - rayLen);
          ctx.lineTo(n.x, n.y + rayLen);
          ctx.stroke();
        }
      }

      // Dot — gently brighter during twinkle
      const dotR = n.r * (1 + twinkle * 0.3);
      ctx.beginPath();
      ctx.arc(n.x, n.y, dotR, 0, Math.PI * 2);
      if (twinkle > 0.1) {
        const blend = twinkle * 0.7;
        ctx.fillStyle = `rgba(${200 + blend*55}, ${225 + blend*30}, 255, ${nodeAlpha.toFixed(2)})`;
      } else {
        ctx.fillStyle = n.color + nodeAlpha.toFixed(2) + ')';
      }
      ctx.fill();
    });

    requestAnimationFrame(draw);
  }

  resize();
  createNodes();
  draw();
  window.addEventListener('resize', () => { resize(); createNodes(); });
}

// Init: load R logo image first, then start canvas
(async function() {
  logoPixelData = await loadRLogoPixels();
  if (!logoPixelData) {
    console.error('Failed to load R logo pixels');
    return;
  }
  initCanvasA();
})();
</script>
